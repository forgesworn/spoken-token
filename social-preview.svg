      <!-- Key teeth -->
      <line x1="16" y1="22" x2="20" y2="22" stroke="#64748b" stroke-width="1.5"/>
      <line x1="16" y1="26" x2="20" y2="26" stroke="#64748b" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Title: spoken-token -->
  <text x="660" y="310" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Menlo', monospace" font-size="48" font-weight="bold" fill="#f8fafc">spoken-token</text>

  <!-- Tagline -->
  <text x="660" y="348" font-family="'Inter', -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8">say the word. prove you're real.</text>

  <!-- Keyword ticker -->
  <text y="622" font-family="'SF Mono', 'Fira Code', 'Menlo', monospace" font-size="12" fill="#94a3b8" opacity="0.06">
    <tspan x="30">totp</tspan>
