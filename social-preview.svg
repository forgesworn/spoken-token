    <line x1="0" y1="0" x2="0" y2="200" stroke="#334155" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="0" x2="6" y2="200" stroke="#334155" stroke-width="1" opacity="0.5"/>
    <!-- Key icon (representing shared secret) -->
    <g transform="translate(-6, 82)" fill="none" stroke="#64748b" stroke-width="1.5">
      <!-- Key head (circle) -->
      <circle cx="9" cy="8" r="7" fill="#1e293b" stroke="#64748b"/>
      <circle cx="9" cy="8" r="3" fill="none" stroke="#64748b"/>
      <!-- Key shaft -->
