  <!-- Speech bubble illustration — centred at ~320,300 -->
  <g transform="translate(200, 160)">
    <!-- Speech bubble body -->
    <rect x="40" y="40" width="240" height="160" rx="24" fill="url(#steel)" stroke="url(#steelLight)" stroke-width="2"/>
    <!-- Bubble tail -->
    <polygon points="120,200 100,250 170,200" fill="url(#steel)"/>
    <line x1="120" y1="200" x2="100" y2="250" stroke="url(#steelLight)" stroke-width="2"/>
    <line x1="100" y1="250" x2="155" y2="200" stroke="url(#steel)" stroke-width="3"/>

    <!-- Word inside bubble — "carbon" in amber glow -->
    <text x="160" y="135" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Menlo', monospace" font-size="42" font-weight="bold" fill="url(#amber)" filter="url(#glow)">donkey</text>

    <!-- Subtle HMAC hash hint below the word -->
    <text x="160" y="170" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Menlo', monospace" font-size="10" fill="#475569" opacity="0.5">HMAC-SHA256 &#x2192; 2048 words</text>
  </g>

  <!-- Sound waves radiating from bubble -->
  <g transform="translate(450, 270)" stroke="#fbbf24" fill="none" stroke-linecap="round">
    <path d="M 0,0 Q 18,-20 18,-40 Q 18,-60 0,-80" stroke-width="3" opacity="0.6"/>
    <path d="M 14,10 Q 38,-18 38,-45 Q 38,-72 14,-100" stroke-width="2.5" opacity="0.35"/>
    <path d="M 28,18 Q 56,-16 56,-48 Q 56,-80 28,-114" stroke-width="2" opacity="0.18"/>
  </g>

